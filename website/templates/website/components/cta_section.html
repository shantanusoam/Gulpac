{% load static %}
<section class="page-cta relative overflow-hidden" data-page-cta="{{ cta_section.section_key }}">
  <div class="industries-bg pointer-events-none absolute inset-0 overflow-hidden" aria-hidden="true">
    <img
      {% if cta_section.background_image_url %}
      src="{{ cta_section.background_image_url }}"
      {% else %}
      src="{% static 'images/industries/magnific-hexagon-bg.png' %}"
      {% endif %}
      alt=""
      class="industries-bg__image absolute inset-0 h-full w-full object-cover object-center"
    >
  </div>
  <div class="page-cta__container relative z-10"  >
    <div class="page-cta__content space-y-[3rem] xl:py-[5rem] py-[2rem]">
      <h2 class="page-cta__title">
        <span class="page-cta__title-prefix font-[1000]">{{ cta_section.heading_prefix }}</span>
        <span class="page-cta__title-accent font-bold">{{ cta_section.heading_accent }}</span>
      </h2>
      <p class="page-cta__desc w-full">{{ cta_section.description }}</p>
      <a href="{{ cta_section.button_url }}" class="page-cta__button hover:scale-105 ease-in-out duration-300 inline-flex items-center ">
        {{ cta_section.button_label }}
        <i data-lucide="arrow-right" size="22" aria-hidden="true"></i>
      </a>
    </div>
  </div>
</section>

<script>
  window.addEventListener('load', function() {
    if (typeof gsap === "undefined") return;

    if (typeof ScrollTrigger !== "undefined" && !window.__gulpacScrollTriggerRegisteredCta) {
      gsap.registerPlugin(ScrollTrigger);
      window.__gulpacScrollTriggerRegisteredCta = true;
    }

    const reducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reducedMotion) return;

    // Background Image Entrance
    gsap.fromTo(".page-cta .industries-bg__image",
      { autoAlpha: 0, scale: 1.14 },
      { autoAlpha: 1, scale: 1, duration: 1.4, ease: "power2.out",
        scrollTrigger: { trigger: ".page-cta", start: "top 90%", once: true } }
    );

    // Background Scroll Parallax
    gsap.to(".page-cta .industries-bg__image", {
      y: 24,
      ease: "none",
      scrollTrigger: { trigger: ".page-cta", start: "top bottom", end: "bottom top", scrub: 1.2 },
    });

    // Content Entrance
    const ctaTl = gsap.timeline({
      scrollTrigger: { trigger: ".page-cta__container", start: "top 85%", once: true },
    });
    
    ctaTl
      .fromTo(".page-cta__title", { autoAlpha: 0, y: 28 }, { autoAlpha: 1, y: 0, duration: 0.7 })
      .fromTo(".page-cta__desc", { autoAlpha: 0, y: 20 }, { autoAlpha: 1, y: 0, duration: 0.65 }, "-=0.35")
      .fromTo(".page-cta__button", { autoAlpha: 0, y: 16 }, { autoAlpha: 1, y: 0, duration: 0.55 }, "-=0.2");
  });
</script>
